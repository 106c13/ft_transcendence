services:
  nginx:
    build: ./nginx
    container_name: nginx
    ports:
      - "8080:80"
    depends_on:
      - backend
    volumes:
      - ./frontend/dist:/usr/share/nginx/html
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
    networks:
      - ft_transcendence

  backend:
    build: ./backend
    container_name: backend
    expose:
      - "3000"
    env_file:
      - .env
    depends_on:
      - db
    networks:
      - ft_transcendence
    restart: on-failure

  db:
    build: ./db
    container_name: db
    env_file:
      - .env
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - ft_transcendence

networks:
  ft_transcendence:
    driver: bridge

volumes:
  pgdata:
