services:
  nginx:
    build: ./nginx
    ports:
      - "8080:80"
    env_file:
      - .env
    depends_on:
      - backend
    networks:
      - ft_transcendence

  backend:
    build: ./backend
    env_file:
      - .env
    expose:
      - "3000"
