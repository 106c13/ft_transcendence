services:
  nginx:
    build: ./nginx
    ports:
      - "8080:80"
    env_file:
      - .env
    depends_on:
      - backend
    networks:
      - ft_transcendence
    volumes:
      - ./frontend:/usr/share/nginx/html
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf

  backend:
    build: ./backend
    env_file:
      - .env
    expose:
      - "3000"
    depends_on:
      - db
    networks:
      - ft_transcendence
    restart:
      on-failure

  db:
    build: ./db
    env_file:
      - .env
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - ft_transcendence

networks:
  ft_transcendence:
    driver: bridge

volumes:
  pgdata:
