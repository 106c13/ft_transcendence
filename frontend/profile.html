<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8" />
	<title>Profile</title>

	<style>
		body {
			margin: 0;
			font-family: Arial, sans-serif;
			background: #0f172a;
			color: white;
			display: flex;
			justify-content: center;
			align-items: center;
			height: 100vh;
		}

		.card {
			display: flex;
			align-items: center;
			gap: 20px;
			background: #1e293b;
			padding: 25px 30px;
			border-radius: 12px;
			box-shadow: 0 10px 30px rgba(0,0,0,0.4);
			min-width: 300px;
		}

		.avatar {
			width: 90px;
			height: 90px;
			border-radius: 50%;
			object-fit: cover;
			border: 2px solid #3b82f6;
		}

		.info {
			display: flex;
			flex-direction: column;
		}

		.username {
			font-size: 22px;
			font-weight: bold;
		}

		.email {
			font-size: 14px;
			color: #94a3b8;
			margin-top: 5px;
		}

		.error {
			color: #f87171;
			text-align: center;
		}

		.logout-btn {
			margin-top: 20px;
			padding: 10px 15px;
			border: none;
			border-radius: 8px;
			background: #ef4444;
			color: white;
			cursor: pointer;
			transition: 0.2s;
		}

		.logout-btn:hover {
			background: #dc2626;
		}
	</style>
</head>

<body>

	<div id="container"></div>
	<script>
		async function loadProfile() {
			const token = localStorage.getItem('token');

			if (!token) {
				window.location.href = '/login.html';
				return;
			}

			try {
				const res = await fetch('/api/users/me', {
					headers: {
						Authorization: `Bearer ${token}`
					}
				});
				
				if (res.status === 401) {
					localStorage.removeItem('token');
					window.location.href = '/login.html';
					return;
				}

				if (!res.ok) {
					console.error("API error:", await res.text());
					return;
				}

				const user = await res.json();

				document.getElementById('container').innerHTML = `
					<div class="card">
						<img class="avatar" src="/assets/${user.avatar || 'default.jpg'}" />
						<div class="info">
							<div class="username">${user.username}</div>
							<div class="email">${user.email}</div>
							
	   						<button class="logout-btn" onclick="logout()">Logout</button>
						</div>
					</div>
				`;

			} catch (err) {
				document.getElementById('container').innerHTML =
					'<div class="error">Network error</div>';
			}
		}

		function logout() {
			localStorage.removeItem('token');
			window.location.href = '/login.html';
		}

		loadProfile();
	</script>
</body>
</html>
